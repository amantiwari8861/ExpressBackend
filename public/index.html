<!DOCTYPE html>
<html>
<head>
  <title>Paytm Test Payment</title>

  <script>
    async function startPayment(event) {
      event.preventDefault();

      const amount = document.getElementById("amount").value;
      const customerId = document.getElementById("customerId").value;

      const response = await fetch("/api/payment/create-order", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount, customerId }),
      });

      const data = await response.json();

      window.Paytm.CheckoutJS.init({
        root: "",
        flow: "DEFAULT",
        data: {
          orderId: data.orderId,
          token: data.txnToken,
          tokenType: "TXN_TOKEN",
          amount: amount,
        },
        handler: {
          notifyMerchant: function (eventName, data) {
            console.log("Event:", eventName, data);
          },
        },
      }).then(function () {
        window.Paytm.CheckoutJS.invoke();
      });
    }
  </script>

  <script
    src="https://securegw-stage.paytm.in/merchantpgpui/checkoutjs/merchants/SeWElw74608697930376.js">
  </script>
</head>

<body>
  <h2>Paytm Payment Test</h2>

  <form onsubmit="startPayment(event)">
    <input
      type="text"
      id="customerId"
      placeholder="Customer ID"
      required
    /><br /><br />

    <input
      type="number"
      id="amount"
      placeholder="Amount (INR)"
      required
    /><br /><br />

    <button type="submit">Pay Now</button>
  </form>
</body>
</html>
