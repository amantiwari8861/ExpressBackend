name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        continue-on-error: true # Since no tests are defined

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            # Navigate to your app directory on EC2
            cd /home/ubuntu/express_backend  # Change this to your actual path

            # Pull latest changes
            git pull origin main

            # Install dependencies
            npm ci --production

            # Install PM2 globally if not already installed
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            # Start or restart the app with PM2
            pm2 stop express_backend || true  # Stop if running
            pm2 delete express_backend || true  # Delete if exists
            pm2 start src/index.js --name express_backend
            pm2 save

            # Optional: Configure PM2 to start on boot
            pm2 startup
            pm2 save
